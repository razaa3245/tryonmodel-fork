name: Deploy AI Model

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to RunPod
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.RUNPOD_HOST }}
          port: ${{ secrets.RUNPOD_PORT }}
          username: root
          key: ${{ secrets.RUNPOD_SSH_KEY }}
          script: |
            cd /workspace/tryonmodel-fork
            git pull origin main
            pip install -r requirements.txt -q --root-user-action=ignore
            bash /workspace/start-ai.sh
            echo "done"
