version: '3.8'

services:
  app:
    build: .
    image: unet-iris:latest
    container_name: fastapi-model

    ports:
      - "8001:8001"

    environment:
      - PYTHONUNBUFFERED=1

    shm_size: '2gb'
    mem_limit: 6g
    mem_reservation: 2g

    restart: unless-stopped

    # 🔥 IMPORTANT: volume mount for live sync
    volumes:
      - .:/app              # full project sync
      - ./images:/app/images  # specifically images folder

    working_dir: /app